<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark rounded square background -->
  <rect width="32" height="32" rx="7" fill="#141414"/>
  <!-- The mark IS the wordmark's own punctuation: log( ger ) — a visual pun,
       not a generic dashboard/chart icon. Single color, reads at any size. -->
  <path d="M12 7 Q7 16 12 25" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M20 7 Q25 16 20 25" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round"/>
  <circle cx="16" cy="16" r="2" fill="#6366F1"/>
</svg>
